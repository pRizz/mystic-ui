name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: website
        run: bun x playwright install --with-deps chromium

      - name: Smoke test GitHub Pages routing
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        working-directory: website
        run: bun run smoke:test

      - name: Generate gallery screenshots
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        working-directory: website
        run: bun run gallery:screenshots

      - name: Build static Pages artifact
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        working-directory: website
        run: bun run build:pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
