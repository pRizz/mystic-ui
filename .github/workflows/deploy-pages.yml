name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: 20

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Install Playwright Chromium
        run: pnpm --filter @mystic-ui/website exec playwright install --with-deps chromium

      - name: Smoke test GitHub Pages routing
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        run: pnpm --filter @mystic-ui/website smoke:test

      - name: Generate gallery screenshots
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        run: pnpm --filter @mystic-ui/website gallery:screenshots

      - name: Build static Pages artifact
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          DEPLOY_TARGET: github-pages
        run: pnpm --filter @mystic-ui/website build:pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
